---
- name: "Neovim installation"
  hosts: localhost
  connection: local 
  gather_facts: false
  become: true
  tasks:
  - name: "Install Neovim and utils with pacman"
    community.general.pacman:
      state: "present"
      name:
        - pyright  # lsp
        - lua-language-server  # lsp
        - bash-language-server  # lsp
        - ripgrep  # telescope dependency
        - fd  # telescope dependency
        - neovim
